<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<style>
body{
  font-family:Arial;
  background:#eef3f7;
  padding:20px;
}

.wrapper{
  background:#f0f0f0;
  padding:15px;
  border-radius:12px;
}

/* 🔥 SCROLL CONTAINER */
.table-container{
  overflow-x:auto;
}

/* TABLE */
table{
  min-width:1200px; /* allows spilling */
  border-collapse:collapse;
  background:white;
  font-size:13px;
}

th,td{
  padding:8px;
  border:1px solid #ddd;
  text-align:center;
  white-space:nowrap; /* prevent wrapping */
}

th{
  background:#4CAF50;
  color:white;
}

/* 🔥 BUTTON ROW */
.action{
  display:flex;
  justify-content:center;
  gap:6px;
}

.btn{
  width:70px;
  padding:6px 0;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

/* LIGHT COLORS */
.edit{ background:#66bb6a; }
.del{ background:#ef5350; }

.edit:hover{ background:#57a05a; }
.del:hover{ background:#d84343; }

</style>
</head>

<body>

<script>
if(sessionStorage.getItem("adminAuth") !== "true"){
  alert("Unauthorized access");
  location.href="index.html";
}
</script>

<h2>Admin Panel</h2>

<div class="wrapper">

<button onclick="load()">Refresh</button>

<div class="table-container">

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Gender</th>
<th>Position</th>
<th>Subject</th>
<th>Years</th>
<th>GSIS</th>
<th>PhilHealth</th>
<th>TIN</th>
<th>Email</th>
<th>Employee</th>
<th>BP</th>
<th>Updated</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tb"></tbody>

</table>

</div>

</div>

<script>

async function load(){
const r = await fetch("/api/teachers");
const data = await r.json();

tb.innerHTML = "";

data.forEach(t=>{
tb.innerHTML += `
<tr>
<td>${t.id}</td>
<td>${t.name||""}</td>
<td>${t.gender||""}</td>
<td>${t.position||""}</td>
<td>${t.subject||""}</td>
<td>${t.years_service||""}</td>
<td>${t.gsis_no||""}</td>
<td>${t.philhealth_no||""}</td>
<td>${t.tin_no||""}</td>
<td>${t.teacher_id||""}</td>
<td>${t.employee_no||""}</td>
<td>${t.bp_no||""}</td>
<td>${formatDate(t.last_updated)}</td>
<td>
  <div class="action">
    <button class="btn edit" onclick="edit('${t.teacher_id}')">Edit</button>
    <button class="btn del" onclick="del(${t.id})">Delete</button>
  </div>
</td>
</tr>`;
});
}

/* DATE ONLY */
function formatDate(dt){
  if(!dt) return "";
  const d = new Date(dt);
  return d.toLocaleDateString("en-US", {
    timeZone:"Asia/Manila",
    year:"numeric",
    month:"short",
    day:"numeric"
  });
}

function edit(id){
localStorage.setItem("editUser", id);
location.href="index.html";
}

async function del(id){
await fetch("/api/teachers/"+id,{method:"DELETE"});
load();
}

window.onload = load;

</script>

</body>
</html>
