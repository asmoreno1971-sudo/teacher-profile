<!DOCTYPE html>
<html>
<head>
  <title>POS Roadworthy - Admin</title>
  <style>
    body{font-family:Arial;padding:16px;background:#f6f3ef}
    .card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:14px;margin-bottom:12px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    input,button{padding:8px 10px;border-radius:8px;border:1px solid #ccc}
    button{background:#6f4e37;color:#fff;border:none;cursor:pointer}
    table{width:100%;border-collapse:collapse;background:#fff}
    th,td{border:1px solid #ddd;padding:8px;font-size:14px;text-align:left}
    th{background:#eee}
  </style>
</head>
<body>
  <h2>POS Roadworthy Admin Report</h2>
  <div class="card row">
    <label>Date:</label><input type="date" id="dateFilter">
    <button onclick="loadSales()">Apply Filter</button>
    <button onclick="window.print()">Print</button>
    <strong>Daily Total: ₱<span id="dailyTotal">0</span></strong>
  </div>
  <table>
    <thead><tr><th>Sale ID</th><th>Order ID</th><th>Customer</th><th>Pickup</th><th>Total</th><th>Created</th></tr></thead>
    <tbody id="salesBody"></tbody>
  </table>
<script>
function toDate(v){return new Date(v).toISOString().slice(0,10)}
async function loadSales(){
  const res=await fetch('/api/sales');
  const all=await res.json();
  const f=document.getElementById('dateFilter').value;
  const rows=f?all.filter(s=>toDate(s.created_at)===f):all;
  let total=0;
  salesBody.innerHTML=rows.map(r=>{total+=Number(r.total||0);return `<tr><td>${r.sale_id}</td><td>${r.order_id}</td><td>${r.customer_name}</td><td>${r.pickup_time}</td><td>₱${r.total}</td><td>${r.created_at}</td></tr>`}).join('') || '<tr><td colspan="6">No sales</td></tr>';
  dailyTotal.innerText=total.toFixed(2);
}
loadSales();
</script>
</body>
</html>
