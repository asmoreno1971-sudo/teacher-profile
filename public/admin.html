<!DOCTYPE html>
<html>
<head>
<title>Admin - Teacher Records</title>

<style>
body{
  font-family:Arial;
  background:#eef3f7;
  padding:20px;
}

h1{
  text-align:center;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td{
  padding:10px;
  border:1px solid #ddd;
  text-align:left;
}

th{
  background:#4CAF50;
  color:white;
}

tr:nth-child(even){
  background:#f9f9f9;
}

button{
  padding:5px 10px;
  margin-right:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.edit{
  background:#3498db;
  color:white;
}

.delete{
  background:#e74c3c;
  color:white;
}
</style>
</head>

<body>

<h1>All Teacher Records</h1>

<div style="overflow-x:auto;">
<table>
<thead>
<tr>
<th>Name</th>
<th>Gender</th>
<th>Position</th>
<th>Subject</th>
<th>Years</th>
<th>GSIS</th>
<th>PhilHealth</th>
<th>TIN</th>
<th>Employee No</th>
<th>BP No</th>
<th>Email</th>
<th style="min-width:200px;">Last Updated</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>
</table>
</div>

<script>

async function loadAll(){

const res = await fetch("/api/all-teachers");
const data = await res.json();

const body = document.getElementById("tableBody");
body.innerHTML = "";

data.forEach(d => {
  body.innerHTML += `
  <tr>
    <td>${d.name || "-"}</td>
    <td>${d.gender || "-"}</td>
    <td>${d.position || "-"}</td>
    <td>${d.subject || "-"}</td>
    <td>${d.years_service || "-"}</td>
    <td>${d.gsis_no || "-"}</td>
    <td>${d.philhealth_no || "-"}</td>
    <td>${d.tin_no || "-"}</td>
    <td>${d.employee_no || "-"}</td>
    <td>${d.bp_no || "-"}</td>
    <td>${d.teacher_id || "-"}</td>
    <td style="min-width:200px;">${d.last_updated || "-"}</td>
    <td>
      <button class="edit" onclick="editTeacher('${d.teacher_id}')">Edit</button>
      <button class="delete" onclick="deleteTeacher('${d.teacher_id}')">Delete</button>
    </td>
  </tr>
  `;
});

}

/* EDIT */
function editTeacher(id){
  window.location.href = "index.html?edit=" + id;
}

/* DELETE */
async function deleteTeacher(id){
  if(!confirm("Delete this record?")) return;

  await fetch("/api/delete-teacher/" + id, {
    method: "DELETE"
  });

  loadAll();
}

window.onload = loadAll;

</script>

</body>
</html>
