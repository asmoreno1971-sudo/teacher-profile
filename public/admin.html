<!DOCTYPE html>
<html>
<head>
<title>Admin - Teacher Records</title>

<style>
body{
  font-family:Arial;
  background:#eef3f7;
  padding:20px;
}

h1{
  text-align:center;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td{
  padding:10px;
  border:1px solid #ddd;
  text-align:left;
}

th{
  background:#4CAF50;
  color:white;
}

tr:nth-child(even){
  background:#f9f9f9;
}
</style>
</head>

<body>

<h1>All Teacher Records</h1>

<table>
<thead>
<tr>
<th>Name</th>
<th>Gender</th>
<th>Position</th>
<th>Subject</th>
<th>Years</th>
<th>GSIS</th>
<th>PhilHealth</th>
<th>TIN</th>
<th>Employee No</th>
<th>BP No</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>
</table>

<script>

async function loadAll(){

const res = await fetch("/api/teachers");
const data = await res.json();

const body = document.getElementById("tableBody");
body.innerHTML = "";

data.forEach(d => {
  body.innerHTML += `
  <tr>
    <td>${d.name || "-"}</td>
    <td>${d.gender || "-"}</td>
    <td>${d.position || "-"}</td>
    <td>${d.subject || "-"}</td>
    <td>${d.years_service || "-"}</td>
    <td>${d.gsis_no || "-"}</td>
    <td>${d.philhealth_no || "-"}</td>
    <td>${d.tin_no || "-"}</td>
    <td>${d.employee_no || "-"}</td>
    <td>${d.bp_no || "-"}</td>
  </tr>
  `;
});

}

window.onload = loadAll;

</script>

</body>
</html>
