<script>

/* 🔥 FORCE A WORKING USER */
let user = localStorage.getItem("user");

if(!user){
  user = "teacher1";
  localStorage.setItem("user", user);
}

/* CLOCK */
function updateClock(){
  clock.innerText=new Date().toLocaleString("en-US",{timeZone:"Asia/Manila"});
}
setInterval(updateClock,1000);
updateClock();

/* CAPS */
function caps(el){ el.value=el.value.toUpperCase(); }
[first,middle,position,subject].forEach(el=>{
  el.addEventListener("input",()=>caps(el));
});

/* ENTER NEXT */
const fields=document.querySelectorAll("input,select");
fields.forEach((f,i)=>{
f.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
if(fields[i+1]) fields[i+1].focus();
}
});
});

/* LOAD */
async function loadProfile(){

const res=await fetch("/api/teacher/"+user);
const d=await res.json();

if(!d || !d.name){
  recordContent.innerHTML="No record yet (click Save first)";
  return;
}

const parts=d.name.split(",");
family.value=parts[0]||"";
first.value=(parts[1]||"").trim().split(" ")[0]||"";
middle.value=(parts[1]||"").trim().split(" ")[1]||"";

gender.value=d.gender||"";
position.value=(d.position||"").toUpperCase();
subject.value=(d.subject||"").toUpperCase();
years.value=d.years_service||"";
gsis.value=d.gsis_no||"";
phil.value=d.philhealth_no||"";
tin.value=d.tin_no||"";
emp.value=d.employee_no||"";
bp.value=d.bp_no||"";

updateRecord(d);
}

/* SAVE */
async function save(){

[first,middle,position,subject].forEach(el=>{
el.value=el.value.toUpperCase();
});

await fetch("/api/save-teacher",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
teacher_id:user,
name:family.value+", "+first.value+" "+middle.value,
gender:gender.value,
position:position.value,
subject:subject.value,
years_service:years.value,
gsis_no:gsis.value,
philhealth_no:phil.value,
tin_no:tin.value,
employee_no:emp.value,
bp_no:bp.value
})
});

msg.innerText="Saved";
setTimeout(()=>msg.innerText="",2000);

loadProfile();
}

/* DISPLAY */
function updateRecord(d){
recordContent.innerHTML=`
Name: ${d.name||""}<br>
Position: ${d.position||""}<br>
Subject: ${d.subject||""}<br>
Years: ${d.years_service||""}
`;
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

window.onload=loadProfile;

</script>
