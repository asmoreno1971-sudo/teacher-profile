<!DOCTYPE html>
<html>
<head>
<title>Preorder Menu</title>

<style>
body{
  font-family:Arial;
  padding:12px;
}

.page{
  display:flex;
  gap:20px;
  align-items:flex-start;
}

.main{
  flex:1;
}

/* INPUT + SELECT */
input#name,
select{
  width:100%;
  max-width:300px;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

/* SUMMARY PANEL */
.summary-panel{
  width:260px;
  border:1px solid #ddd;
  border-radius:10px;
  padding:15px;
  position:sticky;
  top:10px;
  background:#fafafa;
}

.summary-header{
  display:flex;
  flex-direction:column;
  width:100%;
  gap:10px;
}

.summary-title-wrap{
  width:100%;
}

#summaryTitle{
  font-size:17px;
  margin:0;
  line-height:1.2;
  font-weight:normal;
  text-align:left;
  width:100%;
  word-break:break-word;
  overflow-wrap:break-word;
  display:flex;
  flex-direction:column;
  gap:2px;
}

.current-time{
  font-size:16px;
  text-align:left;
  white-space:nowrap;
}

.summary-time{
  font-size:16px;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:1px solid #ddd;
}

.sum-row{
  display:grid;
  grid-template-columns:1fr 40px 80px;
  align-items:center;
  margin-bottom:4px;
}

.sum-name{
  text-align:left;
}

.sum-qty{
  text-align:right;
}

.sum-price{
  text-align:right;
}

.summary-total{
  display:flex;
  justify-content:flex-end;
  margin-top:10px;
  font-weight:bold;
}

/* MENU ROW */
.menu-row{
  display:grid;
  grid-template-columns:120px 110px 240px;
  align-items:center;
  gap:10px;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.img-wrap{
  position:relative;
  width:110px;
  height:70px;
}

.menu-img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay-name{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  color:#fff;
  font-size:12px;
  padding:4px;
}

.controls{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.menu-btn{
  width:32px;
  height:32px;
  background:#6f4e37;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.qty{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  line-height:1;
}

.price-group{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:6px;
  font-family:monospace;
  white-space:nowrap;
  font-size:20px;
}

.subtotal{
  width:90px;
  text-align:right;
  color:#b85c00;
  font-weight:bold;
  font-size:20px;
}

button{
  margin-top:10px;
  padding:10px;
  background:#6f4e37;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:disabled{
  background:#ccc;
}
</style>
</head>

<body>

<div class="page">

<div class="main">

<h3>Preorder Menu</h3>

<input
id="name"
placeholder="Your Name"
style="text-transform:uppercase;">

<h4>Available Time</h4>

<select id="timeSelect">
<option value="">-- Select Time --</option>
</select>

<input type="hidden" id="time">

<div id="menuContainer"></div>

</div>

<div class="summary-panel">

<div class="summary-header">

<div id="nowTime" class="current-time"></div>

<div class="summary-title-wrap">

<h3 id="summaryTitle">
Order Summary
</h3>

</div>

</div>

<div class="summary-time">
Order available at:
<br>
<strong>
<span id="summaryTime">--</span>
</strong>
</div>

<div id="liveSummary">
No items yet
</div>

<div class="summary-total">
Total ₱<span id="liveTotal">0</span>
</div>

<button
id="orderBtn"
disabled
onclick="openSummary()">
Place Order
</button>

</div>

</div>

<script>

let menu=[];

const quantities={};

/* CLOCK */
function updateNowTime(){

  const now=new Date();

  const date=now.toLocaleDateString();

  const h=now.getHours();

  const m=now.getMinutes()
  .toString()
  .padStart(2,'0');

  const ap=h>=12?'PM':'AM';

  const dh=h%12||12;

  document.getElementById('nowTime').innerText=
    `${date} ${dh}:${m} ${ap}`;
}

setInterval(updateNowTime,1000);

updateNowTime();

/* TIME */
function generateTimes(){

  const select=
    document.getElementById('timeSelect');

  const now=new Date();

  now.setMinutes(now.getMinutes()+30);

  for(let i=510;i<=1320;i+=15){

    const slot=new Date();

    slot.setHours(
      Math.floor(i/60),
      i%60
    );

    if(slot < now) continue;

    let h=slot.getHours();

    let ap=h>=12?'PM':'AM';

    let dh=h%12||12;

    let dm=slot.getMinutes()
    .toString()
    .padStart(2,'0');

    const t=`${dh}:${dm} ${ap}`;

    const opt=document.createElement('option');

    opt.value=t;

    opt.textContent=t;

    select.appendChild(opt);
  }
}

generateTimes();

/* SELECT */
timeSelect.onchange=function(){

  time.value=this.value;

  summaryTime.innerHTML=
    this.value
    ? `<strong>${this.value}</strong>`
    : "--";

  validate();
};

/* NAME INPUT */
document
.getElementById("name")
.addEventListener("input", validate);

/* MENU */
fetch('/menu')
.then(r=>r.json())
.then(data=>{

  menu=data;

  renderMenu();
});

function renderMenu(){

  const c=
    document.getElementById('menuContainer');

  c.innerHTML="";

  menu.forEach(item=>{

    quantities[item.id]=0;

    const row=document.createElement('div');

    row.className='menu-row';

    row.innerHTML=`

      <div class="img-wrap">

        <img
        src="${item.image}"
        class="menu-img">

        <div class="overlay-name">
          ${item.name}
        </div>

      </div>

      <div class="controls">

        <button
        class="menu-btn"
        onclick="changeQty('${item.id}',-1)">
        -
        </button>

        <div
        id="q-${item.id}"
        class="qty">
        0
        </div>

        <button
        class="menu-btn"
        onclick="changeQty('${item.id}',1)">
        +
        </button>

      </div>

      <div class="price-group">

        <span id="q2-${item.id}"></span>

        × ₱${item.price} =

        <span
        id="s-${item.id}"
        class="subtotal">
        ₱0
        </span>

      </div>
    `;

    c.appendChild(row);
  });
}

/* QTY */
function changeQty(id,d){

  quantities[id]+=d;

  if(quantities[id]<0){

    quantities[id]=0;
  }

  document.getElementById(`q-${id}`)
  .innerText=quantities[id];

  const qDisplay=
    document.getElementById(`q2-${id}`);

  qDisplay.innerText="";

  updateTotal();

  validate();
}

/* TOTAL */
function updateTotal(){

  let total=0;

  menu.forEach(m=>{

    const sub=
      quantities[m.id]*m.price;

    total+=sub;

    document.getElementById(`s-${m.id}`)
    .innerText=`₱${sub}`;
  });

  updateSummary();
}

/* SUMMARY */
function updateSummary(){

  let html="";

  let total=0;

  menu.forEach(m=>{

    if(quantities[m.id]>0){

      const qty=quantities[m.id];

      const sub=qty*m.price;

      total+=sub;

      html+=`

        <div class="sum-row">

          <div class="sum-name">
            ${m.name}
          </div>

          <div class="sum-qty">
            ${qty}
          </div>

          <div class="sum-price">
            ₱${sub}
          </div>

        </div>
      `;
    }
  });

  liveSummary.innerHTML=
    html || "No items yet";

  liveTotal.innerText=total;
}

/* VALIDATE */
function validate(){

  const nameInput=
    document.getElementById('name');

  nameInput.value =
    nameInput.value.toUpperCase();

  const nameVal =
    nameInput.value.trim();

  document.getElementById("summaryTitle")
  .innerHTML=
    nameVal
    ? `Order Summary:
    <strong>${nameVal}</strong>`
    :"Order Summary";

  let has=false;

  for(let k in quantities){

    if(quantities[k]>0){

      has=true;
    }
  }

  const valid=
    (nameVal && time.value && has);

  orderBtn.disabled=!valid;

  orderBtn.style.background=
    valid
    ? '#6f4e37'
    : '#ccc';
}

function resetSale(){
  for(const k in quantities){ quantities[k]=0; }
  menu.forEach(m=>{
    const q=document.getElementById(`q-${m.id}`); if(q) q.innerText=0;
    const sEl=document.getElementById(`s-${m.id}`); if(sEl) sEl.innerText="₱0";
  });
  name.value="";
  timeSelect.value="";
  time.value="";
  summaryTime.innerText="--";
  updateSummary();
  validate();
}

/* ORDER */
async function openSummary(){

  if(!confirm("Place Order Now?")){
    return;
  }

  const items=[];

  let total=0;

  menu.forEach(m=>{

    if(quantities[m.id] > 0){

      const sub =
        quantities[m.id] * m.price;

      total += sub;

      items.push({

        name:m.name,

        qty:quantities[m.id],

        price:m.price,

        subtotal:sub
      });
    }
  });

  const orderData = {

    customer_name:
      document.getElementById('name')
      .value
      .trim(),

    pickup_time:
      document.getElementById('time')
      .value,

    items:items,

    total:total
  };

  try{

    const res = await fetch('/place-order',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify(orderData)
    });

    const data = await res.json();

    if(data.success){

      await fetch('/api/sales',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          order_id:data.order_id,
          customer_name:orderData.customer_name,
          pickup_time:orderData.pickup_time,
          items:orderData.items,
          total:orderData.total
        })
      });

      alert(
`Order Sent Successfully!

Order ID:
${data.order_id}`
      );

      resetSale();

    }else{

      alert('Failed to send order.');
    }

  }catch(err){

    console.log(err);

    alert('Server connection failed.');
  }
}

</script>

</body>
</html>
